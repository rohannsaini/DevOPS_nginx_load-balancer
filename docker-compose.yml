version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2

  app1:
    image: nginx:alpine
    #build: .
    container_name: app1
    ports:
      - "3000:80"
    volumes:
      - ./app1:/usr/share/nginx/html

  app2:
    image: nginx:alpine
    #build: .
    container_name: app2
    ports:
      - "3001:80"
    volumes:
      - ./app2:/usr/share/nginx/html

  #redis:
    #image: redis
    #container_name: redis
